<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRC Live Chart</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    #header h2 {
      margin: 0 0 10px 0;
    }
    #price {
      margin-bottom: 10px;
      font-size: 20px;
    }
    #chart {
      width: 100%;
      height: 500px; /* mandatory for chart to show */
    }
  </style>

  <!-- Ethers.js (Cloudflare CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <!-- Lightweight Charts (Cloudflare CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.js"></script>
</head>

<body>

<div id="header">
  <h2>TRC / USD Live</h2>
</div>

<div id="price">Loading...</div>

<div id="chart"></div>

<script>
  // ================= CONFIG =================
  const ICO = "0xA6F33c57891E52258d68BC99c593207E5C1B4a51";
  const ABI = ["function usdPrice() view returns(uint256)"];
  const RPCS = [
    "https://polygon.llamarpc.com",
    "https://rpc.ankr.com/polygon",
    "https://polygon-rpc.com"
  ];

  let provider;
  let contract;

  // ================= INIT PROVIDER =================
  async function initProvider() {
    for (let rpc of RPCS) {
      try {
        const testProvider = new ethers.providers.JsonRpcProvider(rpc);
        await testProvider.getBlockNumber();

        provider = testProvider;
        contract = new ethers.Contract(ICO, ABI, provider);

        console.log("Connected RPC:", rpc);
        return;
      } catch (e) {
        console.log("RPC failed:", rpc);
      }
    }
    document.getElementById("price").innerText = "RPC Failed";
  }

  // ================= CHART =================
  let chart;
  let realSeries, dummySeries;
  let lastPrice = 100;

  function initChart() {
    const container = document.getElementById("chart");

    chart = LightweightCharts.createChart(container, {
      width: container.clientWidth,
      height: 500,
      layout: { backgroundColor: "#000", textColor: "#fff" },
      grid: { vertLines: { color: "#444" }, horzLines: { color: "#444" } },
      rightPriceScale: { borderVisible: false },
      timeScale: { borderVisible: false }
    });

    realSeries = chart.addLineSeries({ color: "lime", lineWidth: 2 });
    dummySeries = chart.addLineSeries({ color: "green", lineWidth: 2 });

    const now = Math.floor(Date.now() / 1000);
    dummySeries.setData([
      { time: now - 20, value: lastPrice },
      { time: now - 10, value: lastPrice + 5 },
      { time: now, value: lastPrice - 3 }
    ]);
  }

  // ================= LOAD PRICE =================
  async function loadPrice() {
    const now = Math.floor(Date.now() / 1000);
    let p;
    let isReal = false;

    try {
      if (!contract) throw new Error("No contract");

      const priceRaw = await contract.usdPrice();
      p = Number(ethers.utils.formatUnits(priceRaw, 18));

      if (!p || p === 0) throw new Error("Price = 0");

      isReal = true;
      lastPrice = p;
      document.getElementById("price").innerText = "Real: $" + p.toFixed(2);
    } catch (e) {
      const delta = (Math.random() - 0.5) * 2;
      p = lastPrice + delta;
      lastPrice = p;
      document.getElementById("price").innerText = "Dummy: $" + p.toFixed(2);
    }

    if (isReal) {
      realSeries.update({ time: now, value: p });
    } else {
      dummySeries.update({ time: now, value: p });
    }
  }

  // ================= START =================
  window.addEventListener("load", async () => {
    initChart();
    await initProvider();
    await loadPrice();
    setInterval(loadPrice, 10000);
  });

  window.addEventListener("resize", () => {
    if (chart) chart.resize(window.innerWidth, 500);
  });
</script>

</body>
</html>
